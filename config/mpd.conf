# QuantumSync Local — MPD Configuration
# This file is installed to /etc/quantumsync-local/mpd.conf

music_directory     "/opt/quantumsync-local/music"
playlist_directory  "/var/lib/quantumsync-local/mpd/playlists"
db_file             "/var/lib/quantumsync-local/mpd/database"
log_file            "syslog"
pid_file            "/run/quantumsync-local/mpd.pid"
state_file          "/var/lib/quantumsync-local/mpd/state"
sticker_file        "/var/lib/quantumsync-local/mpd/sticker.sql"

# Run as quantumsync user
user                "quantumsync"

# Bind to localhost only (controlled via quantumsync-local HTTP API)
bind_to_address     "localhost"
port                "6600"

# Auto-update database when music directory changes
auto_update         "yes"

# Audio output — ALSA headphone jack on Raspberry Pi
audio_output {
    type            "alsa"
    name            "Headphones"
    device          "plughw:Headphones"
    mixer_type      "none"
}

# Fallback output if Headphones device not found
# Uncomment this and comment out the above if needed
#audio_output {
#    type            "alsa"
#    name            "Default"
#    device          "plughw:0,0"
#    mixer_type      "none"
#}

# Filesystem charset
filesystem_charset  "UTF-8"

# Replay gain (normalize volume across tracks)
replaygain          "auto"

# Buffer settings for smooth playback
audio_buffer_size   "4096"
buffer_before_play  "20%"
